title: The Quotient Series
description: Fast-paced techno-thrillers by Gregory R. Simpson — espionage, quantum computing, and global stakes.
author: Gregory R. Simpson
url: "https://simpsong00.com"
baseurl: ""

# Build
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/
timezone: America/New_York

# Plugins (all supported by GitHub Pages)
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

# Pagination
paginate: 10
paginate_path: "/blog/page:num/"

# Apply default layout to posts
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# Exclude source files from Jekyll build
exclude:
  - _blog-source/
  - Gemfile
  - Gemfile.lock
  - setup.sh
  - README.md
  - .DS_Store
  - vendor/
