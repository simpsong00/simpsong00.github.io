<footer class="site-footer">
  <div class="container">
    <div class="footer-signup">
      <h3>Get Updates from Greg</h3>
      <p>New books, new blog posts, behind-the-scenes news — no spam, ever.</p>
      <form
        action="https://buttondown.com/api/emails/embed-subscribe/{{ site.buttondown_username }}"
        method="post"
        target="popupwindow"
        onsubmit="window.open('https://buttondown.com/{{ site.buttondown_username }}', 'popupwindow')">
        <input type="email" name="email" placeholder="you@example.com" required>
        <button type="submit" class="btn btn-primary">Subscribe</button>
      </form>
    </div>
    <p>&copy; {{ site.time | date: '%Y' }} Gregory R. Simpson &bull; The Quotient Series</p>
    <div class="footer-links">
      <a href="https://linkedin.com/in/gregorysimpsonge" target="_blank" rel="noopener">LinkedIn</a>
      <a href="{{ '/blog/' | relative_url }}">Blog</a>
      <a href="{{ '/author' | relative_url }}">Contact</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      <a href="{{ '/rocket.html' | relative_url }}" class="footer-rocket" title="Play Rocket Soccer" aria-label="Play Rocket Soccer">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
          <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
          <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
          <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
        </svg>
      </a>
    </div>
  </div>
</footer>
