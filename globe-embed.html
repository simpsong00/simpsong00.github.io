document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0.6263,14.3757],['ql-glencovey','Glencovey, New Zealand',-44.847,168.384],['ql-vegas','Las Vegas, Nevada',36.1699,-115.1398],['ql-kauai','Kauai, Hawaii',22.0964,-159.5261],['ql-llnl','Lawrence Livermore Labs',37.6819,-121.7068]].map((r,i)=>({id:r[0],name:r[1],lat:r[2],lng:r[3],book:'launch',bookName:'Quantum Launch',color:L,stop:i+1}));\n\n    this.points = [...this.contingent, ...this.time, ...this.launch];\n  }\n\n  // Location photos are stored as separate files (NOT embedded), one per\n  // location id, and loaded lazily only when a card is opened. To add a photo\n  // for a location, drop a file named  {id}.jpg  into the photoBase() folder —\n  // no code change needed. A location with no file simply shows its placeholder.\n  photoBase(){ return 'location-photos/'; }\n\n  // Optional per-location overrides for non-standard filenames / extensions.\n  photoOverrides(){ return {}; }\n\n  buildArcs(list, book){\n    const arcs = [];\n    const cStart = book==='contingent' ? 'rgba(67,212,255,0.04)' : book==='time' ? 'rgba(255,177,61,0.04)' : 'rgba(179,136,255,0.04)';\n    const cEnd   = book==='contingent' ? 'rgba(67,212,255,0.95)' : book==='time' ? 'rgba(255,177,61,0.98)' : 'rgba(179,136,255,0.95)';\n    for(let i=0;i<list.length-1;i++){\n      const a=list[i], b=list[i+1];\n      arcs.push({startLat:a.lat,startLng:a.lng,endLat:b.lat,endLng:b.lng,color:[cStart,cEnd],book});\n    }\n    return arcs;\n  }\n\n  componentDidMount(){\n    this.tryInit();\n    // Prevent a stray image drop (one that misses the photo frame) from\n    // navigating the whole page to the image file.\n    this._dragGuard = (e) => {\n      if (e.target && e.target.closest && e.target.closest('image-slot')) return;\n      e.preventDefault();\n      if (e.type === 'drop' && e.dataTransfer) e.dataTransfer.dropEffect = 'none';\n    };\n    window.addEventListener('dragover', this._dragGuard);\n    window.addEventListener('drop', this._dragGuard);\n  }\n\n  tryInit(){\n    const el = document.getElementById('globeViz');\n    if(!window.Globe || !el){ setTimeout(()=>this.tryInit(), 80); return; }\n    if(this._inited) return; this._inited = true;\n\n    const arcs = [...this.buildArcs(this.contingent,'contingent'), ...this.buildArcs(this.time,'time'), ...this.buildArcs(this.launch,'launch')];\n\n    const world = window.Globe()(el)\n      .backgroundColor('rgba(0,0,0,0)')\n      .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')\n      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')\n      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')\n      .showAtmosphere(true)\n      .atmosphereColor('#3a6ea5')\n      .atmosphereAltitude(0.18)\n      .pointsData(this.points)\n      .pointLat('lat').pointLng('lng')\n      .pointColor('color')\n      .pointAltitude(0.012)\n      .pointRadius(0.34)\n      .pointResolution(18)\n      .pointLabel(d => `<div style=\"font-family:'Space Grotesk',sans-serif;background:rgba(8,12,22,0.92);border:1px solid ${d.color}55;border-left:3px solid ${d.color};border-radius:7px;padding:7px 12px;color:#eaf1fb;font-size:13px;font-weight:500;box-shadow:0 8px 26px rgba(0,0,0,.5);white-space:nowrap;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;color:${d.color};margin-bottom:3px;\">${d.bookName.toUpperCase()}<\u002Fdiv>${d.name}<\u002Fdiv>`)\n      .arcsData(arcs)\n      .arcColor('color')\n      .arcAltitudeAutoScale(0.45)\n      .arcStroke(0.55)\n      .arcDashLength(0.45)\n      .arcDashGap(0.22)\n      .arcDashInitialGap(() => Math.random())\n      .arcDashAnimateTime(3200)\n      .ringsData(this.points)\n      .ringLat('lat').ringLng('lng')\n      .ringMaxRadius(3.2)\n      .ringPropagationSpeed(1.6)\n      .ringRepeatPeriod(1700)\n      .ringColor(d => (t) => {\n        const hex = d.color;\n        const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);\n        return `rgba(${r},${g},${b},${1-t})`;\n      })\n      .onPointClick(d => this.selectPoint(d));\n\n    this.world = world;\n\n    // Brighten the globe so continents read clearly against the dark space\n    try {\n      const mat = world.globeMaterial();\n      if(mat && mat.color){\n        mat.color.set(0x6f8bb0);          // lift landmass midtones\n        mat.bumpScale = 7;\n        if(mat.emissive){ mat.emissive.set(0x0c1830); mat.emissiveIntensity = 0.9; }\n        mat.needsUpdate = true;\n      }\n    } catch(e){}\n\n    // Boost scene lighting (reuse an existing light's constructor — no global THREE dependency)\n    try {\n      const scene = world.scene();\n      let dirRef = null;\n      scene.traverse(o => {\n        if(o.isAmbientLight) o.intensity = 1.6;\n        if(o.isDirectionalLight){ o.intensity = 2.2; dirRef = o; }\n      });\n      if(dirRef){\n        const fill = new dirRef.constructor(0x88aadd, 1.1);\n        fill.position.set(-1, 0.5, -1);\n        scene.add(fill);\n      }\n    } catch(e){}\n\n    const controls = world.controls();\n    controls.autoRotate = true;\n    controls.autoRotateSpeed = 0.32;\n    controls.enableZoom = true;\n    controls.minDistance = 180;\n    controls.maxDistance = 600;\n    controls.addEventListener('start', () => { controls.autoRotate = false; });\n\n    world.pointOfView({ lat: 28, lng: -38, altitude: 2.4 }, 0);\n\n    const renderer = world.renderer && world.renderer();\n    const resize = () => { world.width(el.clientWidth).height(el.clientHeight); };\n    window.addEventListener('resize', resize);\n    this._resize = resize;\n    resize();\n  }\n\n  componentWillUnmount(){\n    if(this._resize) window.removeEventListener('resize', this._resize);\n    if(this._dragGuard){ window.removeEventListener('dragover', this._dragGuard); window.removeEventListener('drop', this._dragGuard); }\n  }\n\n  componentDidUpdate(_, prevState){\n    if(this.state.selected && this.state.selected !== prevState.selected){\n      this.mountPhoto h.abs(s.lat).toFixed(3)}°${s.lat>=0?'N':'S'}  ${Math.abs(s.lng).toFixed(3)}°${s.lng>=0?'E':'W'}` : '';\n    const col = s ? s.color : '#43d4ff';\n    const rgb = (hex)=>({r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)});\n    const c = rgb(col);\n    return {\n      selected: s,\n      selectedName: s ? s.name : '',\n      selectedBook: s ? s.bookName : '',\n      selectedCoords: coords,\n      selectedStop: s ? `${s.stop} OF ${s.book==='contingent'?27:34}` : '',\n      selectedColor: col,\n      selectedTagBg: `rgba(${c.r},${c.g},${c.b},0.12)`,\n      selectedTagBorder: `rgba(${c.r},${c.g},${c.b},0.35)`,\n      closePanel: () => this.setState({ selected: null }),\n      focusContingent: () => this.focusBook(this.contingent),\n      focusTime: () => this.focusBook(this.time), focusLaunch: () => this.focusBook(this.launch),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
