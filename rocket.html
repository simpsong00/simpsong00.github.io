<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rocket Soccer</title>
<link rel="icon" href="favicon.png">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0b1020;
    color: #e8ecff;
    font-family: "Segoe UI", Helvetica, Arial, sans-serif;
    height: 100%;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 16px 8px;
  }
  h1 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #4da6ff, #ff9a3d);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  canvas {
    background: #101630;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(77, 166, 255, .25);
    max-width: 100%;
    height: auto;
    touch-action: none;
  }
  #help {
    font-size: 13px;
    color: #9aa6d0;
    text-align: center;
    line-height: 1.6;
  }
  kbd {
    background: #1c2547;
    border: 1px solid #38447a;
    border-radius: 4px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 12px;
  }
</style>
</head>
<body>
<div id="wrap">
  <h1>Rocket Soccer</h1>
  <canvas id="game" width="960" height="600"></canvas>
  <div id="help">
    <kbd>&uarr;</kbd>/<kbd>W</kbd> accelerate &nbsp; <kbd>&darr;</kbd>/<kbd>S</kbd> reverse &nbsp;
    <kbd>&larr;</kbd><kbd>&rarr;</kbd>/<kbd>A</kbd><kbd>D</kbd> steer &nbsp;
    <kbd>Shift</kbd> or <kbd>Space</kbd> boost &nbsp; <kbd>Enter</kbd> restart<br>
    You are <b style="color:#4da6ff">blue</b> — score in the orange goal on the right. First to lead when the clock hits 0:00 wins.
  </div>
</div>

<script>
(() => {
"use strict";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

// ---------- Arena ----------
const WALL = 14;                 // wall thickness
const CORNER = 70;               // 45-degree corner cut size
const GOAL_W = 150;              // goal mouth height
const GOAL_DEPTH = 34;           // how deep the goal pocket is
const FIELD = {
  left: WALL, right: W - WALL, top: WALL, bottom: H - WALL,
  cx: W / 2, cy: H / 2,
  goalTop: H / 2 - GOAL_W / 2,
  goalBot: H / 2 + GOAL_W / 2
};
const MATCH_LENGTH = 120;        // seconds

// ---------- Input ----------
const keys = {};
addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) e.preventDefault();
  if (e.code === "Enter" && state.phase === "gameover") resetMatch();
});
addEventListener("keyup", e => { keys[e.code] = false; });

// ---------- Sound (tiny WebAudio synth) ----------
let audio = null;
function ac() {
  if (!audio) { try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (audio && audio.state === "suspended") audio.resume();
  return audio;
}
addEventListener("keydown", ac, { once: true });

function thump(strength) {
  const a = ac(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(120 + strength * 60, a.currentTime);
  o.frequency.exponentialRampToValueAtTime(50, a.currentTime + 0.12);
  g.gain.setValueAtTime(Math.min(0.4, 0.08 + strength * 0.1), a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.15);
  o.connect(g).connect(a.destination);
  o.start(); o.stop(a.currentTime + 0.16);
}

function boom() {
  const a = ac(); if (!a) return;
  const len = 0.8, buf = a.createBuffer(1, a.sampleRate * len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.2);
  const src = a.createBufferSource(); src.buffer = buf;
  const f = a.createBiquadFilter(); f.type = "lowpass";
  f.frequency.setValueAtTime(2200, a.currentTime);
  f.frequency.exponentialRampToValueAtTime(120, a.currentTime + len);
  const g = a.createGain(); g.gain.value = 0.55;
  src.connect(f).connect(g).connect(a.destination);
  src.start();
  const o = a.createOscillator(), og = a.createGain();
  o.type = "triangle";
  o.frequency.setValueAtTime(160, a.currentTime);
  o.frequency.exponentialRampToValueAtTime(40, a.currentTime + 0.5);
  og.gain.setValueAtTime(0.4, a.currentTime);
  og.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.55);
  o.connect(og).connect(a.destination);
  o.start(); o.stop(a.currentTime + 0.6);
}

function whistle() {
  const a = ac(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = "square";
  o.frequency.setValueAtTime(880, a.currentTime);
  g.gain.setValueAtTime(0.06, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.35);
  o.connect(g).connect(a.destination);
  o.start(); o.stop(a.currentTime + 0.35);
}

// ---------- Entities ----------
function makeCar(x, y, angle, color, glow) {
  return {
    x, y, angle, vx: 0, vy: 0,
    w: 40, h: 22, radius: 21,
    color, glow,
    boost: 100, boosting: false,
    homeX: x, homeY: y, homeA: angle
  };
}

const player = makeCar(220, H / 2, 0, "#4da6ff", "rgba(77,166,255,");
const bot    = makeCar(W - 220, H / 2, Math.PI, "#ff9a3d", "rgba(255,154,61,");

const ball = { x: W / 2, y: H / 2, vx: 0, vy: 0, r: 16 };

// Boost pads
const pads = [
  { x: W / 2, y: 90 }, { x: W / 2, y: H - 90 },
  { x: 170, y: 120 }, { x: 170, y: H - 120 },
  { x: W - 170, y: 120 }, { x: W - 170, y: H - 120 }
].map(p => ({ ...p, t: 0 }));   // t = respawn timer

const state = {
  phase: "kickoff",             // kickoff | play | goal | gameover
  phaseT: 3,                    // countdown / pause timer
  scoreL: 0, scoreR: 0,         // L = player (blue), R = bot (orange)
  clock: MATCH_LENGTH,
  shake: 0,
  flash: 0,
  goalSide: 0,                  // which goal exploded: -1 left, 1 right
  message: ""
};

const particles = [];
const trails = [];

function resetPositions() {
  for (const c of [player, bot]) {
    c.x = c.homeX; c.y = c.homeY; c.angle = c.homeA;
    c.vx = c.vy = 0; c.boost = 100;
  }
  ball.x = W / 2; ball.y = H / 2; ball.vx = ball.vy = 0;
  particles.length = 0;
  trails.length = 0;
}

function resetMatch() {
  state.scoreL = state.scoreR = 0;
  state.clock = MATCH_LENGTH;
  state.phase = "kickoff";
  state.phaseT = 3;
  resetPositions();
}

// ---------- Goal explosion ----------
function explodeGoal(side, color) {
  const gx = side === 1 ? FIELD.right : FIELD.left;
  const gy = H / 2;
  boom();
  state.shake = 22;
  state.flash = 1;
  for (let i = 0; i < 140; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 60 + Math.random() * 480;
    particles.push({
      x: gx, y: gy + (Math.random() - 0.5) * GOAL_W,
      vx: Math.cos(a) * sp - side * (150 + Math.random() * 250),
      vy: Math.sin(a) * sp,
      life: 0.7 + Math.random() * 0.9,
      maxLife: 1.6,
      size: 2 + Math.random() * 5,
      color
    });
  }
  // shockwave ring
  particles.push({ ring: true, x: gx - side * 10, y: gy, r: 10, vr: 700, life: 0.5, maxLife: 0.5 });
}

function sparks(x, y, n, color, speed) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = speed * (0.3 + Math.random());
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.25 + Math.random() * 0.35, maxLife: 0.6,
      size: 1.5 + Math.random() * 2.5, color
    });
  }
}

// ---------- Physics ----------
const CAR_ACCEL = 620;
const CAR_REV = 380;
const CAR_TURN = 3.4;
const CAR_DRAG = 1.6;
const CAR_GRIP = 6.0;           // how fast sideways velocity is killed
const CAR_MAX = 330;
const BOOST_ACCEL = 700;
const BOOST_MAX = 520;
const BALL_DRAG = 0.45;

function driveCar(c, input, dt) {
  // throttle
  let ax = 0, ay = 0;
  const fx = Math.cos(c.angle), fy = Math.sin(c.angle);
  c.boosting = false;
  if (input.boost && c.boost > 0 && input.throttle >= 0) {
    ax += fx * BOOST_ACCEL; ay += fy * BOOST_ACCEL;
    c.boost = Math.max(0, c.boost - 38 * dt);
    c.boosting = true;
  }
  if (input.throttle > 0) { ax += fx * CAR_ACCEL; ay += fy * CAR_ACCEL; }
  else if (input.throttle < 0) { ax -= fx * CAR_REV; ay -= fy * CAR_REV; }

  c.vx += ax * dt; c.vy += ay * dt;

  // steering scales with speed so the car doesn't spin in place
  const speed = Math.hypot(c.vx, c.vy);
  const dir = (c.vx * fx + c.vy * fy) >= 0 ? 1 : -1;   // reverse steers opposite
  const steerPower = Math.min(1, speed / 120);
  c.angle += input.steer * CAR_TURN * steerPower * dir * dt;

  // split velocity into forward/lateral, damp lateral hard (grip), forward lightly (drag)
  const f2x = Math.cos(c.angle), f2y = Math.sin(c.angle);
  let fwd = c.vx * f2x + c.vy * f2y;
  let lat = -c.vx * f2y + c.vy * f2x;
  fwd *= Math.exp(-CAR_DRAG * dt * 0.4);
  lat *= Math.exp(-CAR_GRIP * dt);
  const max = c.boosting ? BOOST_MAX : CAR_MAX;
  if (Math.abs(fwd) > max) fwd = max * Math.sign(fwd);
  c.vx = f2x * fwd - f2y * lat;
  c.vy = f2y * fwd + f2x * lat;

  // boost regen
  if (!c.boosting) c.boost = Math.min(100, c.boost + 7 * dt);

  c.x += c.vx * dt;
  c.y += c.vy * dt;

  if (c.boosting) {
    trails.push({ x: c.x - f2x * 22, y: c.y - f2y * 22, life: 0.3, maxLife: 0.3, color: c.glow });
  }

  collideWalls(c, c.radius, 0.3, false);
}

// Walls + corner cuts. Goals are holes in the side walls for the ball only.
function collideWalls(o, r, bounce, isBall) {
  let hit = 0;
  const inGoalMouth = o.y > FIELD.goalTop + (isBall ? 0 : -4) && o.y < FIELD.goalBot - (isBall ? 0 : -4);

  // side walls (skip where the goal mouth is — ball can enter, cars get a shallow pocket too)
  if (!inGoalMouth) {
    if (o.x - r < FIELD.left)  { o.x = FIELD.left + r;  if (o.vx < 0) { hit = Math.abs(o.vx); o.vx = -o.vx * bounce; } }
    if (o.x + r > FIELD.right) { o.x = FIELD.right - r; if (o.vx > 0) { hit = Math.abs(o.vx); o.vx = -o.vx * bounce; } }
  } else {
    // back of the goal pocket
    if (o.x - r < FIELD.left - GOAL_DEPTH)  { o.x = FIELD.left - GOAL_DEPTH + r;  if (o.vx < 0) o.vx = -o.vx * bounce; }
    if (o.x + r > FIELD.right + GOAL_DEPTH) { o.x = FIELD.right + GOAL_DEPTH - r; if (o.vx > 0) o.vx = -o.vx * bounce; }
    // goal posts (top/bottom of the pocket)
    if (o.x < FIELD.left || o.x > FIELD.right) {
      if (o.y - r < FIELD.goalTop) { o.y = FIELD.goalTop + r; if (o.vy < 0) o.vy = -o.vy * bounce; }
      if (o.y + r > FIELD.goalBot) { o.y = FIELD.goalBot - r; if (o.vy > 0) o.vy = -o.vy * bounce; }
    }
  }
  if (o.y - r < FIELD.top)    { o.y = FIELD.top + r;    if (o.vy < 0) { hit = Math.abs(o.vy); o.vy = -o.vy * bounce; } }
  if (o.y + r > FIELD.bottom) { o.y = FIELD.bottom - r; if (o.vy > 0) { hit = Math.abs(o.vy); o.vy = -o.vy * bounce; } }

  // 45° corner cuts: reflect along the diagonal normals
  const corners = [
    { px: FIELD.left,  py: FIELD.top,    nx:  Math.SQRT1_2, ny:  Math.SQRT1_2 },
    { px: FIELD.right, py: FIELD.top,    nx: -Math.SQRT1_2, ny:  Math.SQRT1_2 },
    { px: FIELD.left,  py: FIELD.bottom, nx:  Math.SQRT1_2, ny: -Math.SQRT1_2 },
    { px: FIELD.right, py: FIELD.bottom, nx: -Math.SQRT1_2, ny: -Math.SQRT1_2 }
  ];
  for (const cn of corners) {
    // signed distance from the cut line (line passes through the point offset CORNER along one axis)
    const d = (o.x - cn.px) * cn.nx + (o.y - cn.py) * cn.ny - CORNER * Math.SQRT1_2;
    if (d < r) {
      const push = r - d;
      o.x += cn.nx * push; o.y += cn.ny * push;
      const vn = o.vx * cn.nx + o.vy * cn.ny;
      if (vn < 0) {
        o.vx -= (1 + bounce) * vn * cn.nx;
        o.vy -= (1 + bounce) * vn * cn.ny;
        hit = Math.abs(vn);
      }
    }
  }
  return hit;
}

function carBall(c, dt) {
  const dx = ball.x - c.x, dy = ball.y - c.y;
  const dist = Math.hypot(dx, dy);
  const minD = ball.r + c.radius;
  if (dist > 0 && dist < minD) {
    const nx = dx / dist, ny = dy / dist;
    ball.x = c.x + nx * minD;
    ball.y = c.y + ny * minD;
    const rvx = ball.vx - c.vx, rvy = ball.vy - c.vy;
    const vn = rvx * nx + rvy * ny;
    if (vn < 0) {
      const j = -1.7 * vn;        // restitution
      ball.vx += j * nx; ball.vy += j * ny;
      // extra punch in the car's facing direction when moving fast
      const sp = Math.hypot(c.vx, c.vy);
      ball.vx += nx * sp * 0.35; ball.vy += ny * sp * 0.35;
      const strength = Math.min(1.5, sp / 300);
      thump(strength);
      sparks(ball.x - nx * ball.r, ball.y - ny * ball.r, 8 + strength * 10, c.glow, 120 + sp * 0.4);
    }
  }
}

function carCar(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist = Math.hypot(dx, dy);
  const minD = a.radius + b.radius;
  if (dist > 0 && dist < minD) {
    const nx = dx / dist, ny = dy / dist, overlap = (minD - dist) / 2;
    a.x -= nx * overlap; a.y -= ny * overlap;
    b.x += nx * overlap; b.y += ny * overlap;
    const vn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
    if (vn < 0) {
      const j = -0.8 * vn;
      a.vx -= j * nx; a.vy -= j * ny;
      b.vx += j * nx; b.vy += j * ny;
      thump(0.6);
    }
  }
}

// ---------- Bot AI ----------
function botInput(dt) {
  const defendX = FIELD.right;            // bot defends right goal, attacks left
  const attackGoal = { x: FIELD.left, y: H / 2 };

  // aim point: slightly behind the ball, on the line from the ball away from the target goal
  const bx = ball.x, by = ball.y;
  const gdx = bx - attackGoal.x, gdy = by - attackGoal.y;
  const gd = Math.hypot(gdx, gdy) || 1;
  let tx = bx + (gdx / gd) * 45;
  let ty = by + (gdy / gd) * 45;

  // if the ball is behind the bot (closer to its own goal), retreat toward goal first
  const ballBehind = ball.x > bot.x + 10;
  if (ballBehind) { tx = defendX - 70; ty = ball.y; }

  // low boost? grab nearest live pad when ball is far
  if (bot.boost < 25 && Math.hypot(ball.x - bot.x, ball.y - bot.y) > 220) {
    let best = null, bd = 1e9;
    for (const p of pads) {
      if (p.t > 0) continue;
      const d = Math.hypot(p.x - bot.x, p.y - bot.y);
      if (d < bd) { bd = d; best = p; }
    }
    if (best) { tx = best.x; ty = best.y; }
  }

  const dx = tx - bot.x, dy = ty - bot.y;
  const targetA = Math.atan2(dy, dx);
  let da = targetA - bot.angle;
  while (da > Math.PI) da -= Math.PI * 2;
  while (da < -Math.PI) da += Math.PI * 2;

  const dist = Math.hypot(dx, dy);
  const steer = Math.max(-1, Math.min(1, da * 3));
  let throttle = Math.abs(da) > 2.4 && dist < 140 ? -1 : 1;   // back up if target is right behind
  const boost = Math.abs(da) < 0.3 && dist > 200 && bot.boost > 30;

  return { steer, throttle, boost };
}

// ---------- Game loop ----------
let last = performance.now();
function frame(now) {
  let dt = Math.min(0.033, (now - last) / 1000);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}

function update(dt) {
  state.shake = Math.max(0, state.shake - 60 * dt);
  state.flash = Math.max(0, state.flash - 2.2 * dt);

  // particles always update
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    if (p.ring) { p.r += p.vr * dt; continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= Math.exp(-1.8 * dt); p.vy *= Math.exp(-1.8 * dt);
  }
  for (let i = trails.length - 1; i >= 0; i--) {
    trails[i].life -= dt;
    if (trails[i].life <= 0) trails.splice(i, 1);
  }
  for (const p of pads) p.t = Math.max(0, p.t - dt);

  if (state.phase === "kickoff") {
    state.phaseT -= dt;
    if (state.phaseT <= 0) { state.phase = "play"; whistle(); }
    return;
  }
  if (state.phase === "goal") {
    state.phaseT -= dt;
    // ball keeps flying during the celebration
    stepBall(dt);
    if (state.phaseT <= 0) {
      resetPositions();
      if (state.clock <= 0) { state.phase = "gameover"; endMessage(); }
      else { state.phase = "kickoff"; state.phaseT = 3; }
    }
    return;
  }
  if (state.phase === "gameover") return;

  // ----- play -----
  state.clock = Math.max(0, state.clock - dt);

  const pin = {
    steer: (keys.ArrowLeft || keys.KeyA ? -1 : 0) + (keys.ArrowRight || keys.KeyD ? 1 : 0),
    throttle: (keys.ArrowUp || keys.KeyW ? 1 : 0) + (keys.ArrowDown || keys.KeyS ? -1 : 0),
    boost: !!(keys.ShiftLeft || keys.ShiftRight || keys.Space)
  };
  driveCar(player, pin, dt);
  driveCar(bot, botInput(dt), dt);
  carCar(player, bot);
  carBall(player, dt);
  carBall(bot, dt);
  stepBall(dt);

  // boost pads
  for (const c of [player, bot]) {
    for (const p of pads) {
      if (p.t <= 0 && Math.hypot(c.x - p.x, c.y - p.y) < c.radius + 12) {
        c.boost = Math.min(100, c.boost + 30);
        p.t = 6;
        sparks(p.x, p.y, 10, "rgba(120,255,170,", 140);
      }
    }
  }

  // goal detection: ball fully past the goal line
  if (ball.x + ball.r < FIELD.left && ball.y > FIELD.goalTop && ball.y < FIELD.goalBot) {
    score(1);   // ball in LEFT goal -> orange (bot) scores
  } else if (ball.x - ball.r > FIELD.right && ball.y > FIELD.goalTop && ball.y < FIELD.goalBot) {
    score(-1);  // ball in RIGHT goal -> blue (player) scores
  }

  if (state.clock <= 0 && state.phase === "play") {
    if (state.scoreL !== state.scoreR) { state.phase = "gameover"; endMessage(); whistle(); }
    // tie: sudden death — next goal wins (clock stays at 0)
    else state.message = "OVERTIME — NEXT GOAL WINS";
  }
}

function stepBall(dt) {
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;
  const damp = Math.exp(-BALL_DRAG * dt);
  ball.vx *= damp; ball.vy *= damp;
  const hit = collideWalls(ball, ball.r, 0.85, true);
  if (hit > 150) thump(Math.min(1, hit / 500));
}

function score(side) {
  // side: -1 means the LEFT team (player/blue) scored into the right goal
  const scorerColor = side === -1 ? player.glow : bot.glow;
  if (side === -1) state.scoreL++; else state.scoreR++;
  explodeGoal(side === -1 ? 1 : -1, scorerColor);
  state.goalSide = side;
  state.phase = "goal";
  state.phaseT = 2.4;
  state.message = side === -1 ? "GOAL — BLUE SCORES!" : "GOAL — ORANGE SCORES!";
}

function endMessage() {
  state.message = state.scoreL > state.scoreR ? "BLUE WINS!" :
                  state.scoreR > state.scoreL ? "ORANGE WINS!" : "DRAW";
}

// ---------- Drawing ----------
function draw() {
  ctx.save();
  if (state.shake > 0) {
    ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
  }

  // field
  ctx.fillStyle = "#101630";
  ctx.fillRect(-30, -30, W + 60, H + 60);

  // pitch markings
  ctx.strokeStyle = "rgba(120,140,220,0.25)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W / 2, FIELD.top); ctx.lineTo(W / 2, FIELD.bottom); ctx.stroke();
  ctx.beginPath(); ctx.arc(W / 2, H / 2, 70, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(W / 2, H / 2, 6, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(120,140,220,0.25)"; ctx.fill();

  // walls (with corner cuts and goal gaps)
  ctx.strokeStyle = "#38447a";
  ctx.lineWidth = WALL;
  ctx.lineJoin = "round";
  ctx.beginPath();
  const L = FIELD.left, R = FIELD.right, T = FIELD.top, B = FIELD.bottom, C = CORNER;
  ctx.moveTo(L, FIELD.goalTop);
  ctx.lineTo(L, T + C); ctx.lineTo(L + C, T);          // top-left corner
  ctx.lineTo(R - C, T); ctx.lineTo(R, T + C);          // top-right
  ctx.lineTo(R, FIELD.goalTop);
  ctx.moveTo(R, FIELD.goalBot);
  ctx.lineTo(R, B - C); ctx.lineTo(R - C, B);          // bottom-right
  ctx.lineTo(L + C, B); ctx.lineTo(L, B - C);          // bottom-left
  ctx.lineTo(L, FIELD.goalBot);
  ctx.stroke();

  // goal pockets
  drawGoal(-1); drawGoal(1);

  // boost pads
  for (const p of pads) {
    const alive = p.t <= 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
    ctx.fillStyle = alive ? "rgba(120,255,170,0.85)" : "rgba(120,255,170,0.15)";
    ctx.fill();
    if (alive) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 14 + Math.sin(performance.now() / 200) * 2, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(120,255,170,0.4)";
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // boost trails
  for (const t of trails) {
    const a = t.life / t.maxLife;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 6 * a + 2, 0, Math.PI * 2);
    ctx.fillStyle = t.color + (a * 0.6) + ")";
    ctx.fill();
  }

  drawCar(bot);
  drawCar(player);
  drawBall();

  // particles
  for (const p of particles) {
    if (p.ring) {
      const a = p.life / p.maxLife;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${a * 0.8})`;
      ctx.lineWidth = 4 * a + 1;
      ctx.stroke();
      continue;
    }
    const a = Math.max(0, p.life / p.maxLife);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
    ctx.fillStyle = p.color + a + ")";
    ctx.fill();
  }

  drawHUD();

  ctx.restore();

  // white flash on goal
  if (state.flash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${state.flash * 0.45})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawGoal(side) {
  const x = side === 1 ? FIELD.right : FIELD.left - GOAL_DEPTH;
  const teamGlow = side === 1 ? bot.glow : player.glow;
  ctx.fillStyle = teamGlow + "0.12)";
  ctx.fillRect(x, FIELD.goalTop, GOAL_DEPTH, GOAL_W);
  ctx.strokeStyle = teamGlow + "0.7)";
  ctx.lineWidth = 4;
  ctx.strokeRect(x, FIELD.goalTop, GOAL_DEPTH, GOAL_W);
  // net lines
  ctx.strokeStyle = teamGlow + "0.25)";
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    const nx = x + (GOAL_DEPTH / 4) * i;
    ctx.beginPath(); ctx.moveTo(nx, FIELD.goalTop); ctx.lineTo(nx, FIELD.goalBot); ctx.stroke();
  }
  for (let i = 1; i < 6; i++) {
    const ny = FIELD.goalTop + (GOAL_W / 6) * i;
    ctx.beginPath(); ctx.moveTo(x, ny); ctx.lineTo(x + GOAL_DEPTH, ny); ctx.stroke();
  }
}

function drawCar(c) {
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.angle);

  // glow
  ctx.shadowColor = c.glow + "0.9)";
  ctx.shadowBlur = c.boosting ? 25 : 12;

  // body
  ctx.fillStyle = c.color;
  roundRect(-c.w / 2, -c.h / 2, c.w, c.h, 6);
  ctx.fill();
  ctx.shadowBlur = 0;

  // cabin
  ctx.fillStyle = "rgba(10,16,40,0.85)";
  roundRect(-c.w / 2 + 8, -c.h / 2 + 4, c.w - 22, c.h - 8, 4);
  ctx.fill();

  // nose stripe
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.fillRect(c.w / 2 - 6, -c.h / 2 + 3, 3, c.h - 6);

  // boost flame
  if (c.boosting) {
    const f = 10 + Math.random() * 12;
    ctx.beginPath();
    ctx.moveTo(-c.w / 2, -5);
    ctx.lineTo(-c.w / 2 - f, 0);
    ctx.lineTo(-c.w / 2, 5);
    ctx.closePath();
    ctx.fillStyle = "rgba(255,220,120,0.9)";
    ctx.fill();
  }
  ctx.restore();
}

function drawBall() {
  ctx.save();
  ctx.shadowColor = "rgba(255,255,255,0.7)";
  ctx.shadowBlur = 18;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = "#e8ecff";
  ctx.fill();
  ctx.shadowBlur = 0;
  // hex-ish pattern
  ctx.strokeStyle = "rgba(60,80,140,0.6)";
  ctx.lineWidth = 1.5;
  const rot = (ball.x + ball.y) / 60;   // fake rolling
  for (let i = 0; i < 3; i++) {
    const a = rot + (i * Math.PI) / 3;
    ctx.beginPath();
    ctx.ellipse(ball.x, ball.y, ball.r - 3, (ball.r - 3) * 0.35, a, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawHUD() {
  // scoreboard
  ctx.textAlign = "center";
  ctx.font = "bold 34px 'Segoe UI', sans-serif";
  ctx.fillStyle = player.color;
  ctx.fillText(state.scoreL, W / 2 - 70, 52);
  ctx.fillStyle = bot.color;
  ctx.fillText(state.scoreR, W / 2 + 70, 52);

  const m = Math.floor(state.clock / 60), s = Math.floor(state.clock % 60);
  ctx.fillStyle = state.clock <= 10 && state.clock > 0 ? "#ff6868" : "#e8ecff";
  ctx.font = "bold 26px 'Segoe UI', sans-serif";
  ctx.fillText(`${m}:${String(s).padStart(2, "0")}`, W / 2, 50);

  // boost meter
  const bw = 160, bh = 12, bx = W / 2 - bw / 2, by = H - 34;
  ctx.fillStyle = "rgba(255,255,255,0.12)";
  roundRect(bx, by, bw, bh, 6); ctx.fill();
  ctx.fillStyle = player.boost > 25 ? "#ffd34d" : "#ff7a4d";
  if (player.boost > 1) { roundRect(bx, by, bw * (player.boost / 100), bh, 6); ctx.fill(); }
  ctx.fillStyle = "#9aa6d0";
  ctx.font = "11px 'Segoe UI', sans-serif";
  ctx.fillText("BOOST", W / 2, by - 5);

  // phase overlays
  if (state.phase === "kickoff") {
    const n = Math.ceil(state.phaseT);
    bigText(n > 0 ? String(n) : "GO!", "#e8ecff");
  } else if (state.phase === "goal") {
    bigText(state.message, state.goalSide === -1 ? player.color : bot.color);
  } else if (state.phase === "gameover") {
    ctx.fillStyle = "rgba(8,12,28,0.75)";
    ctx.fillRect(0, 0, W, H);
    bigText(state.message, state.scoreL > state.scoreR ? player.color : state.scoreR > state.scoreL ? bot.color : "#e8ecff");
    ctx.fillStyle = "#9aa6d0";
    ctx.font = "20px 'Segoe UI', sans-serif";
    ctx.fillText(`Final score  ${state.scoreL} – ${state.scoreR}`, W / 2, H / 2 + 40);
    ctx.fillText("Press Enter to play again", W / 2, H / 2 + 72);
  } else if (state.clock <= 0 && state.message.startsWith("OVERTIME")) {
    ctx.fillStyle = "#ff6868";
    ctx.font = "bold 18px 'Segoe UI', sans-serif";
    ctx.fillText(state.message, W / 2, 80);
  }
}

function bigText(text, color) {
  ctx.save();
  ctx.textAlign = "center";
  ctx.font = "bold 56px 'Segoe UI', sans-serif";
  ctx.shadowColor = color;
  ctx.shadowBlur = 30;
  ctx.fillStyle = color;
  ctx.fillText(text, W / 2, H / 2 - 20);
  ctx.restore();
}

resetMatch();
requestAnimationFrame(frame);

// console handle for debugging
window.__rocket = { ball, state, player, bot };
})();
</script>
</body>
</html>
