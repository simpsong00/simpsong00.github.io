---
layout: default
title: Search
permalink: /search/
---

<div class="blog-header">
  <div class="container">
    <h1>Search the Blog</h1>
    <p>Search across all post titles and tags.</p>
  </div>
</div>

<div class="container" style="padding: 3rem 1.5rem; max-width: 760px;">

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="Search posts..."
      autocomplete="off"
      autofocus>
    <span id="searchClear" title="Clear">&times;</span>
  </div>

  <p id="searchStatus" style="color:#999; font-size:0.9rem; margin: 1rem 0 0;"></p>

  <div id="searchResults" class="post-list" style="margin-top: 1.5rem;"></div>

</div>

<script src="https://unpkg.com/lunr/lunr.min.js"></script>
<script>
  var searchIndex, searchDocs;

  fetch('/search.json')
    .then(function(r) { return r.json(); })
    .then(function(docs) {
      searchDocs = docs;
      searchIndex = lunr(function() {
        this.ref('url');
        this.field('title', { boost: 10 });
        this.field('tags', { boost: 5 });
        this.field('content');
        docs.forEach(function(doc) { this.add(doc); }, this);
      });
      // Run search immediately if there's a query param
      var q = new URLSearchParams(window.location.search).get('q');
      if (q) {
        document.getElementById('searchInput').value = q;
        runSearch(q);
      }
    });

  document.getElementById('searchInput').addEventListener('input', function() {
    runSearch(this.value.trim());
  });

  document.getElementById('searchClear').addEventListener('click', function() {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('searchStatus').textContent = '';
    document.getElementById('searchInput').focus();
  });

  function runSearch(query) {
    var results = document.getElementById('searchResults');
    var status  = document.getElementById('searchStatus');
    results.innerHTML = '';

    if (!query || query.length < 2) {
      status.textContent = '';
      return;
    }

    var matches = searchIndex.search(query + '*');

    if (matches.length === 0) {
      status.textContent = 'No posts found for "' + query + '"';
      return;
    }

    status.textContent = matches.length + ' post' + (matches.length > 1 ? 's' : '') + ' found';

    matches.forEach(function(match) {
      var doc = searchDocs.find(function(d) { return d.url === match.ref; });
      if (!doc) return;

      var tags = doc.tags
        ? doc.tags.split(' ')
            .filter(function(t) { return t && t !== 'All'; })
            .map(function(t) { return '<span class="post-tag">' + t + '</span>'; })
            .join(' ')
        : '';

      results.innerHTML +=
        '<article class="post-card">' +
          '<div class="post-card-meta">' + doc.date + '</div>' +
          '<h2><a href="' + doc.url + '">' + doc.title + '</a></h2>' +
          (tags ? '<div class="post-card-tags">' + tags + '</div>' : '') +
        '</article>';
    });
  }
</script>
