<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 800" width="530" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e67e00;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e67e00;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="530" height="800" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="60" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="150" cy="40" r="1" fill="white" opacity="0.4"/>
  <circle cx="280" cy="60" r="2" fill="white" opacity="0.5"/>
  <circle cx="400" cy="90" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="470" cy="35" r="1" fill="white" opacity="0.4"/>
  <circle cx="90" cy="160" r="1" fill="white" opacity="0.3"/>
  <circle cx="490" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="30" cy="300" r="1" fill="white" opacity="0.4"/>
  <circle cx="510" cy="350" r="1" fill="white" opacity="0.3"/>
  <circle cx="200" cy="130" r="1" fill="#e67e00" opacity="0.7"/>
  <circle cx="350" cy="170" r="1.5" fill="#e67e00" opacity="0.5"/>
  <circle cx="440" cy="130" r="1" fill="white" opacity="0.5"/>
  <circle cx="120" cy="220" r="1" fill="white" opacity="0.3"/>
  <circle cx="380" cy="280" r="1" fill="white" opacity="0.4"/>

  <!-- Orange glow from rocket -->
  <ellipse cx="265" cy="560" rx="120" ry="60" fill="url(#glow)"/>

  <!-- Rocket -->
  <g transform="translate(215, 280)">
    <!-- Body -->
    <path d="M50,0 C50,0 90,40 90,120 L90,180 L10,180 L10,120 C10,40 50,0 50,0 Z" fill="#e67e00"/>
    <!-- Window -->
    <circle cx="50" cy="100" r="18" fill="#0a0a14" stroke="#fff" stroke-width="2"/>
    <circle cx="50" cy="100" r="10" fill="#1a1a2e"/>
    <!-- Wings -->
    <path d="M10,150 L-20,200 L10,190 Z" fill="#c05c00"/>
    <path d="M90,150 L120,200 L90,190 Z" fill="#c05c00"/>
    <!-- Flame -->
    <path d="M25,180 C25,180 35,220 50,230 C65,220 75,180 75,180 Z" fill="#fff" opacity="0.9"/>
    <path d="M30,180 C30,180 40,210 50,218 C60,210 70,180 70,180 Z" fill="#e67e00"/>
  </g>

  <!-- Top label -->
  <text x="265" y="220" font-family="Georgia, serif" font-size="18" fill="#e67e00" text-anchor="middle" letter-spacing="4" opacity="0.9">THE QUOTIENT SERIES</text>
  <line x1="80" y1="230" x2="450" y2="230" stroke="#e67e00" stroke-width="0.5" opacity="0.4"/>

  <!-- Title -->
  <text x="265" y="600" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">QUANTUM</text>
  <text x="265" y="655" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">LAUNCH</text>

  <!-- Divider -->
  <line x1="80" y1="675" x2="450" y2="675" stroke="#e67e00" stroke-width="1" opacity="0.6"/>

  <!-- Coming soon -->
  <text x="265" y="710" font-family="Georgia, serif" font-size="20" fill="#e67e00" text-anchor="middle" letter-spacing="3">COMING 2027</text>

  <!-- Author -->
  <text x="265" y="760" font-family="Georgia, serif" font-size="16" fill="white" text-anchor="middle" opacity="0.7" letter-spacing="2">GREGORY R. SIMPSON</text>
</svg>
